<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Submission — Lights Out Puzzle Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        @page { margin: 1in; size: A4; }
        body {
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            margin: 0;
            padding: 40px;
            background: #ffffff;
        }
        .card {
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-size: 26pt;
            font-weight: 800;
            margin-bottom: 6px;
            line-height: 1.2;
        }
        h1 span { color: #00b4d8; }
        .subtitle {
            font-size: 11pt;
            color: #6b7280;
            margin-bottom: 40px;
        }
        .line {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #00b4d8, #7209b7);
            border-radius: 2px;
            margin: 24px auto;
        }
        .link-box {
            display: inline-block;
            margin: 30px 0;
            padding: 18px 36px;
            border: 2px solid #00b4d8;
            border-radius: 12px;
            background: #f0faff;
        }
        .link-label {
            font-size: 9pt;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #6b7280;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .link-url {
            font-size: 16pt;
            font-weight: 700;
            color: #00b4d8;
            text-decoration: none;
            word-break: break-all;
        }
        .meta {
            margin-top: 36px;
            font-size: 10.5pt;
            color: #374151;
            line-height: 2;
        }
        .meta strong { color: #1a1a2e; }
        .tech-tags {
            margin-top: 24px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .tag {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 9pt;
            font-weight: 600;
            border: 1.5px solid #00b4d8;
            color: #00b4d8;
            background: #edfaff;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Lights Out Puzzle <span>Simulator</span></h1>
        <p class="subtitle">GF(2) Automated Solver & Procedural Generator</p>

        <div class="line"></div>

        <div class="link-box">
            <div class="link-label">GitHub Repository</div>
            <a class="link-url" href="https://github.com/lm10-2/lights-out-puzzle">
                github.com/lm10-2/lights-out-puzzle
            </a>
        </div>

        <div class="meta">
            <strong>Author:</strong> lm10-2<br>
            <strong>Language:</strong> HTML5 &bull; CSS3 &bull; JavaScript &nbsp;|&nbsp; <strong>Date:</strong> Jan 2026
        </div>

        <div class="tech-tags">
            <span class="tag">GF(2) Galois Field</span>
            <span class="tag">Gaussian Elimination</span>
            <span class="tag">Matrix Rank Evaluation</span>
            <span class="tag">Linear Algebra</span>
            <span class="tag">Procedural Generation</span>
        </div>
    </div>
</body>
</html>
